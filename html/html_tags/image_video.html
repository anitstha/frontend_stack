<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image and Video Tags in HTML</title>
  </head>
  <body>
    <h1>Images in HTML</h1>
    <img
      width="300px"
      src="https://images.pexels.com/photos/34780944/pexels-photo-34780944.jpeg"
      alt="building image"
    />

    <h1>Video in HTML</h1>
    <video
      width="600"
      src="https://www.pexels.com/download/video/3166326/"
      controls
      autoplay
      muted
      loop
    ></video>
  </body>
</html>
