<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box1 {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to bottom, blue, white, red);
            color: #047874;
        }

        #box2 {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to top, green, black);
            color: #047874;
            margin: 10px;
        }
    </style>

</head>


<body>
    <!-- top to bottom linear gradient -->
    <div id="box1">
        <h1>top to bottom(default)</h1>
    </div>

    <!-- bottom to top linear gradient -->
    <div id="box2">
        <h1>bottom to top</h1>
    </div>

</body>

</html>
